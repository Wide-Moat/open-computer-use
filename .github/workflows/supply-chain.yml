#
# Supply-chain integrity: SBOM + Cosign keyless signature + SLSA-3
# provenance for every container image we publish.
#
# Per CLAUDE.md "Testing & QA discipline (next/v1)" top-3 gate #3:
# "Signed SBOM + SLSA L3 provenance required for every release artifact.
#  Syft → SPDX, Cosign-signed; CI fails if missing."
#
# Kept separate from release.yml so the additions can be reviewed in
# isolation and the existing release workflow stays untouched.

name: supply-chain

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      image_ref:
        description: "Image ref (registry/name:tag) to sign and attest"
        required: true

permissions:
  contents: read
  id-token: write       # Required for Cosign keyless / Sigstore OIDC.
  packages: write       # Required to push signatures + SBOM to GHCR.
  attestations: write   # Required for GitHub-native attestation API.

concurrency:
  group: supply-chain-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sbom-attest-sign:
    name: SBOM + sign + attest (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          # The 4 images we publish, mirroring release.yml release-body block.
          - open-computer-use
          - open-computer-use-server
          - open-computer-use-cleanup
          - open-computer-use-webui

    # All `${{ }}` interpolation of context data happens in env-vars; the
    # `run:` steps only reference `"$VAR"` to defuse shell-injection (CWE-78)
    # — semgrep rule yaml.github-actions.security.run-shell-injection.
    env:
      IMAGE_NAME: ${{ matrix.image }}
      OWNER: ${{ github.repository_owner }}
      REPO: ${{ github.repository }}
      REF_NAME: ${{ github.ref_name }}
      EVENT_NAME: ${{ github.event_name }}
      DISPATCH_REF: ${{ inputs.image_ref }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve image ref
        id: ref
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            ref="$DISPATCH_REF"
          else
            ref="ghcr.io/${OWNER}/${IMAGE_NAME}:${REF_NAME}"
          fi
          # GITHUB_OUTPUT is the canonical write channel — github docs require
          # using >> "$GITHUB_OUTPUT", not echo into a heredoc.
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.7.0

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0.17.7

      - name: Generate SBOM (SPDX JSON + CycloneDX JSON)
        env:
          IMAGE_REF: ${{ steps.ref.outputs.ref }}
        run: |
          syft "$IMAGE_REF" \
            -o spdx-json="sbom.spdx.json" \
            -o cyclonedx-json="sbom.cdx.json"

      - name: Sign image (keyless via Sigstore)
        env:
          IMAGE_REF: ${{ steps.ref.outputs.ref }}
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes "$IMAGE_REF"

      - name: Attest SBOM (in-toto, SPDX predicate)
        env:
          IMAGE_REF: ${{ steps.ref.outputs.ref }}
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            "$IMAGE_REF"

      - name: Attest CycloneDX SBOM
        env:
          IMAGE_REF: ${{ steps.ref.outputs.ref }}
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign attest --yes \
            --predicate sbom.cdx.json \
            --type cyclonedx \
            "$IMAGE_REF"

      - name: GitHub-native SBOM attestation
        # Belt and braces: the GitHub attestation API stores the SBOM in the
        # repo's attestation log so it's discoverable without Sigstore
        # tooling. Cosign + Rekor still produce the canonical artifact above.
        uses: actions/attest-sbom@v2
        with:
          subject-name: ${{ steps.ref.outputs.ref }}
          sbom-path: sbom.spdx.json
          push-to-registry: true

      - name: Verify signature + SBOM attestation
        env:
          IMAGE_REF: ${{ steps.ref.outputs.ref }}
          REPO_FOR_VERIFY: ${{ github.repository }}
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign verify \
            --certificate-identity-regexp "https://github.com/${REPO_FOR_VERIFY}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "$IMAGE_REF"

          cosign verify-attestation \
            --type spdxjson \
            --certificate-identity-regexp "https://github.com/${REPO_FOR_VERIFY}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "$IMAGE_REF"

      - name: Upload SBOMs as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.image }}
          path: |
            sbom.spdx.json
            sbom.cdx.json

  provenance:
    name: SLSA-3 build provenance (${{ matrix.image }})
    needs: sbom-attest-sign
    permissions:
      contents: read
      id-token: write
      packages: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        image:
          - open-computer-use
          - open-computer-use-server
          - open-computer-use-cleanup
          - open-computer-use-webui
    # SLSA generator-container@v2 is the official slsa-framework workflow for
    # container images; it builds provenance, signs it via Sigstore Fulcio,
    # and pushes the attestation next to the image in the registry.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.0.0
    with:
      image: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
      digest: ""   # The generator resolves the digest from the tag.
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}
