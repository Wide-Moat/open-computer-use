#
# Kata Containers values for computer-use-server — use this on containerd 2.x
# clusters (RKE2 / k3s / kubeadm >= 1.34), where Sysbox does not work.
#
# Prerequisites (see docs/kata-runtime.md for the full runbook):
#   1. kata-deploy installed, RuntimeClass `kata-qemu` present:
#        kubectl get runtimeclass kata-qemu
#   2. The target namespace allows privileged pods:
#        kubectl label ns open-computer-use \
#          pod-security.kubernetes.io/enforce=privileged --overwrite
#
# Run:
#   helm install ocu helm/computer-use-server \
#     -n open-computer-use --create-namespace \
#     -f examples/helm/kata/values.yaml
#
# Replace the placeholders (change-me-*, *.example.com) before applying.

secrets:
  create: true
  mcpApiKey: "change-me-32-hex-chars"

orchestrator:
  # Kata RuntimeClass registered by kata-deploy. `kata-qemu` is the QEMU shim.
  runtimeClassName: kata-qemu
  env:
    PUBLIC_BASE_URL: "https://orchestrator.example.com"

dind:
  # REQUIRED under Kata — dockerd needs CAP_NET_ADMIN/RAW for iptables NAT.
  # Safe here: the caps are confined to the Kata microVM.
  privileged: true
  # overlay2 cannot mount on the Kata virtio-fs guest root — use fuse-overlayfs.
  storageDriver: fuse-overlayfs
  # Runs the chart-managed guest init wrapper (installs fuse-overlayfs, creates
  # /dev/fuse, formats + mounts the Block PVC, runs the cgroup-v2 shim).
  kataInit:
    enabled: true

persistence:
  # /var/lib/docker on a Block-mode PVC. A Block PVC arrives in the Kata guest
  # as a virtio-blk device whose ext4 filesystem preserves security.capability
  # xattrs (the virtio-fs root would drop them — CVE-2021-20263).
  varLibDocker:
    persistentVolume:
      enabled: true
      size: 50Gi
      # Set to a StorageClass that provisions Block volumes (e.g. longhorn).
      storageClass: ""

ingress:
  enabled: true
  className: nginx
  annotations:
    # uncomment if using cert-manager
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: orchestrator.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - orchestrator.example.com
      secretName: orchestrator-tls
