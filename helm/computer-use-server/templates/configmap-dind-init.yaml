{{- if .Values.dind.kataInit.enabled }}
{{- /*
Kata-guest init wrapper for the inner Docker daemon. Mounted into the dind
container at /usr/local/bin/dind-entrypoint.sh and run as its entrypoint.
Every step is idempotent and self-detecting so the script is a no-op on
environments that do not need it. See docs/kata-runtime.md for the rationale.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "computer-use-server.fullname" . }}-dind-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "computer-use-server.labels" . | nindent 4 }}
data:
  dind-entrypoint.sh: |
    #!/bin/sh
    # Kata-guest init wrapper — chart-managed, see docs/kata-runtime.md.
    set -eu

    log() { echo "[dind-init] $*"; }

    # (1) fuse-overlayfs — overlay2 fails on the Kata virtio-fs guest root
    #     (kata-containers/kata-containers#1888). Install it if missing.
    if ! command -v fuse-overlayfs >/dev/null 2>&1; then
      log "installing fuse-overlayfs{{ range .Values.dind.kataInit.extraPackages }} {{ . }}{{ end }}"
      apk add --no-cache fuse-overlayfs{{ range .Values.dind.kataInit.extraPackages }} {{ . }}{{ end }}
    fi

    # (2) /dev/fuse — the Kata guest kernel has fuse compiled in but no device
    #     node. fuse-overlayfs needs the node to exist.
    if [ ! -c /dev/fuse ]; then
      log "creating /dev/fuse device node"
      mknod /dev/fuse c 10 229
      chmod 666 /dev/fuse
    fi

    # (3) Block-mode PVC for /var/lib/docker. A Block PVC arrives in the guest as
    #     a raw virtio-blk device; format it ext4 once, then mount it. ext4
    #     preserves security.capability xattrs that virtio-fs would drop
    #     (CVE-2021-20263).
    {{- if eq (include "computer-use-server.varLibDockerIsPVC" .) "true" }}
    DEV=/dev/var-lib-docker
    if [ -b "$DEV" ]; then
      if ! blkid -s TYPE -o value "$DEV" 2>/dev/null | grep -q .; then
        log "formatting $DEV as ext4 (first boot)"
        mkfs.ext4 -F -q "$DEV"
      fi
      mkdir -p /var/lib/docker
      if ! mountpoint -q /var/lib/docker; then
        log "mounting $DEV at /var/lib/docker"
        mount "$DEV" /var/lib/docker
      fi
    else
      log "WARNING: expected block device $DEV not found — skipping mkfs/mount"
    fi
    {{- end }}

    # (4) cgroup-v2 PID-1 evacuation (docker-library/docker#308). The Kata guest's
    #     systemd leaves PID 1 in a domain-threaded root cgroup, which blocks
    #     nested runc ("cannot enter cgroupv2 ... with domain controllers").
    #     Move processes into a child cgroup and republish controllers at root.
    if [ -f /sys/fs/cgroup/cgroup.controllers ] && [ -w /sys/fs/cgroup/cgroup.subtree_control ]; then
      if [ -f /sys/fs/cgroup/cgroup.procs ] && [ -s /sys/fs/cgroup/cgroup.procs ]; then
        log "evacuating cgroup-v2 root (PID-1 domain-threaded fix)"
        mkdir -p /sys/fs/cgroup/init
        # Move every PID out of the root cgroup, one per line.
        while read -r pid; do
          echo "$pid" > /sys/fs/cgroup/init/cgroup.procs 2>/dev/null || true
        done < /sys/fs/cgroup/cgroup.procs
        # Republish every available controller to the root subtree.
        sed 's/\([^ ]\+\)/+\1/g' /sys/fs/cgroup/cgroup.controllers \
          > /sys/fs/cgroup/cgroup.subtree_control 2>/dev/null \
          || log "cgroup subtree_control write skipped (already published)"
      fi
    fi

    log "starting dockerd"
    exec dockerd "$@"
{{- end }}
