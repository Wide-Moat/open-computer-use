{{- /*
Block-mode PVC for the inner dockerd's /var/lib/docker (the Kata default).
A Block PVC arrives in the Kata guest as a virtio-blk device whose ext4
filesystem preserves security.capability xattrs that the virtio-fs root drops.
*/}}
{{- $pv := .Values.persistence.varLibDocker.persistentVolume | default dict }}
{{- if and $pv.enabled (not $pv.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "computer-use-server.fullname" . }}-var-lib-docker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "computer-use-server.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  volumeMode: Block
  resources:
    requests:
      storage: {{ $pv.size }}
  {{- if $pv.storageClass }}
  storageClassName: {{ $pv.storageClass | quote }}
  {{- end }}
{{- end }}
